<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tactical v19.5 - Full Control</title>
    <style>
        :root {
            --bg: #0d0d1a; --card: #16213e; --accent: #00ffcc;
            --gold: #f1c40f; --white: #ffffff; --red: #ff4757;
            --blue: #4d94ff; --out-shadow: 4px 4px 8px #05050a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 420px; background: var(--card); padding: 15px; border-radius: 20px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; gap: 8px; }
        
        .app-header { text-align: center; border-bottom: 2px solid #23305c; padding-bottom: 5px; }
        .app-title { font-size: 1rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .app-title span { color: var(--accent); }

        #alert-zone { 
            min-height: 45px; background: rgba(0, 0, 0, 0.4); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; color: #555; border: 1px solid #1a1a1a; text-align: center;
        }
        .active-alert { border-color: var(--red) !important; color: white !important; background: rgba(255, 71, 87, 0.3) !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { 
            background: #1e2a4a; border: 1px solid #23305c; color: #fff;
            font-size: 1.4rem; font-weight: 900; padding: 15px 0; border-radius: 12px; cursor: pointer;
        }
        .num-btn:active { background: var(--accent); color: #000; }
        
        .utility-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .del-btn { background: #1a1a2e; color: #999; border: 1px solid #333; padding: 10px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .reset-btn { background: rgba(255, 71, 87, 0.1); color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 10px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .tabs { display: flex; gap: 5px; margin-top: 5px;}
        .tab-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--bg); color: #555; font-size: 10px; font-weight: bold; }
        .tab-btn.active { color: var(--accent); border: 1px solid var(--accent); }

        .view-content { display: none; background: var(--bg); border-radius: 12px; padding: 10px; height: 140px; overflow-y: auto; border: 1px solid #222; }
        .view-content.active { display: block; }
        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .res-item { background: var(--card); font-size: 10px; padding: 7px 0; text-align: center; border-radius: 4px; color: var(--accent); font-weight: bold; border: 1px solid #1a1a1a; }

        .predictor-box { 
            background: #05050a; border-radius: 15px; padding: 15px; border: 2px solid var(--gold); 
            text-align: center; margin-top: 5px;
        }
        .pred-title { color: var(--gold); font-weight: 900; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .current-bet { background: rgba(241, 196, 15, 0.1); width: 100%; padding: 10px; border-radius: 10px; border: 1px dashed var(--gold); box-sizing: border-box;}
        .next-bet { background: rgba(0, 255, 204, 0.05); width: 100%; padding: 8px; border-radius: 10px; margin-top: 5px; color: #888; font-size: 13px; box-sizing: border-box;}
        .step-label { font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 2px; }
        .val-big { font-size: 28px; font-weight: 900; color: var(--gold); }
        .val-small { font-size: 18px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1 class="app-title">Megawheel <span>Tactical v19.5</span></h1>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="quickAdd(1)">1</button>
        <button class="num-btn" onclick="quickAdd(2)">2</button>
        <button class="num-btn" onclick="quickAdd(5)">5</button>
        <button class="num-btn" onclick="quickAdd(8)">8</button>
        <button class="num-btn" onclick="quickAdd(10)">10</button>
        <button class="num-btn" onclick="quickAdd(15)">15</button>
        <button class="num-btn" onclick="quickAdd(20)">20</button>
        <button class="num-btn" onclick="quickAdd(30)">30</button>
        <button class="num-btn" onclick="quickAdd(40)">40</button>
    </div>

    <div class="utility-btns">
        <button class="del-btn" onclick="deleteLast()">CORRECTION</button>
        <button class="reset-btn" onclick="resetSession()">RESET SESSION</button>
    </div>

    <div id="alert-zone">SYSTÈME ACTIF</div>

    <div class="tabs">
        <button id="btn-live" class="tab-btn active" onclick="switchTab('live')">LIVE</button>
        <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">HISTORY</button>
    </div>

    <div id="live-view" class="view-content active"><div id="grid-live" class="res-grid"></div></div>
    <div id="archive-view" class="view-content"><div id="grid-archive" class="res-grid"></div></div>

    <div class="predictor-box">
        <div class="pred-title">Assistant de Mise (Cible : 5)</div>
        <div id="tacticalDisplay" class="tactical-main">
            </div>
    </div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v19")) || [];
    let currentStep = 0; 

    const grilleMise = {
        1:500, 2:500, 3:500, 4:500, 5:500,
        6:1000, 7:1000, 8:1000, 9:1000, 10:1000,
        11:1500, 12:1500, 13:1500, 14:1500, 15:1500,
        16:2000, 17:2000, 18:2000, 19:2000, 20:2000,
        21:4000, 22:4000, 23:4000, 24:4000, 25:9000,
        26:9000, 27:9000, 28:15000, 29:15000, 30:22000
    };

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        document.getElementById(tab + '-view').classList.add('active');
    }

    function quickAdd(val) {
        let lastDelay = results.indexOf(5);
        if (lastDelay === -1) lastDelay = 99;

        if (val === 5) { currentStep = 0; } 
        else if (currentStep === 0 && lastDelay >= 19) { currentStep = 1; } 
        else if (currentStep > 0) { currentStep++; }

        results.unshift(val);
        localStorage.setItem("mw_final_v19", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        results.shift();
        if (currentStep > 0) currentStep--;
        updateUI();
    }

    function resetSession() {
        if (confirm("Voulez-vous vraiment effacer l'historique et recommencer à zéro ?")) {
            results = [];
            currentStep = 0;
            localStorage.setItem("mw_final_v19", JSON.stringify(results));
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById("grid-live").innerHTML = results.slice(0, 100).map(n => `<div class="res-item">${n}</div>`).join('');
        document.getElementById("grid-archive").innerHTML = results.map(n => `<div class="res-item">${n}</div>`).join('');
        
        const az = document.getElementById("alert-zone");
        const display = document.getElementById("tacticalDisplay");
        let delay5 = results.indexOf(5);
        if (delay5 === -1) delay5 = results.length;

        if (currentStep === 0) {
            if (delay5 >= 20) {
                az.innerHTML = "🚨 CIBLE DÉTECTÉE : MISER SUR LE 5";
                az.classList.add("active-alert");
                display.innerHTML = `
                    <div class="current-bet">
                        <div class="step-label">Mise Actuelle (Tour 1)</div>
                        <div class="val-big">500 Ar</div>
                    </div>
                    <div class="next-bet">Suivant (T2) : 500 Ar</div>
                `;
            } else {
                az.innerHTML = "ANALYSE • ATTENTE : " + delay5 + "/20 TOURS";
                az.classList.remove("active-alert");
                display.innerHTML = `<div style="color:#444; font-size:18px; font-weight:bold; padding:20px;">OBSERVATION...</div>`;
            }
        } else {
            az.innerHTML = "⚠️ RECOVERY EN COURS - TOUR " + currentStep;
            az.classList.add("active-alert");
            
            let currentMise = grilleMise[currentStep] || "STOP";
            let nextMise = grilleMise[currentStep + 1] || "LIMITE";

            display.innerHTML = `
                <div class="current-bet" style="display:block; width:100%;">
                    <div class="step-label">Mise Actuelle (Tour ${currentStep})</div>
                    <div class="val-big">${currentMise.toLocaleString()} Ar</div>
                </div>
                <div class="next-bet" style="display:block; width:100%;">
                    <div class="step-label">Suivant (Tour ${currentStep + 1})</div>
                    <div class="val-small">${nextMise.toLocaleString()} Ar</div>
                </div>
            `;
        }
    }
    window.onload = updateUI;
</script>
</body>
</html>
