<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker v14.6 - Pad Mode</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
            --out-shadow: 6px 6px 12px #0d1220, -3px -3px 9px #23305c;
            --in-shadow: inset 3px 3px 6px #0d1220, inset -2px -2px 5px #23305c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 12px; border-radius: 20px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; gap: 8px; }
        
        .app-header { text-align: center; border-bottom: 1px solid #23305c; padding-bottom: 5px; }
        .app-title { font-size: 1.1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .app-title span { color: var(--accent); }

        /* ALERT ZONE */
        #alert-zone { min-height: 30px; background: rgba(255, 71, 87, 0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: var(--red); border: 1px solid #222; text-align: center; }
        .active-alert { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.25) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* PAVÉ NUMÉRIQUE (Calculatrice style) */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 5px; }
        .num-btn { 
            background: linear-gradient(145deg, #1e2a4a, #16213e);
            border: 1px solid #23305c; color: var(--white);
            font-size: 1.4rem; font-weight: 900; padding: 12px 0;
            border-radius: 12px; cursor: pointer; box-shadow: var(--out-shadow);
            transition: 0.1s; display: flex; flex-direction: column; align-items: center;
        }
        .num-btn:active { box-shadow: var(--in-shadow); transform: scale(0.96); color: var(--accent); border-color: var(--accent); }
        .num-btn span { font-size: 7px; color: var(--gold); text-transform: uppercase; margin-top: 2px; }

        /* ACTIONS SECONDAIRES */
        .action-row { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; }
        .tabs { display: flex; gap: 5px; }
        .tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: none; background: var(--bg); color: #555; font-size: 9px; font-weight: bold; box-shadow: var(--out-shadow); }
        .tab-btn.active { color: var(--accent); box-shadow: var(--in-shadow); border: 1px solid var(--accent); }
        .del-btn { background: var(--red); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 10px; cursor: pointer; }

        /* HISTORIQUE ET PATTERNS */
        .view-content { display: none; background: var(--bg); border-radius: 12px; padding: 8px; height: 160px; overflow-y: auto; border: 1px solid #222; box-shadow: var(--in-shadow); }
        .view-content.active { display: block; }
        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; }
        .res-item { background: var(--card); font-size: 10px; padding: 6px 0; text-align: center; border-radius: 4px; color: var(--accent); position: relative; font-weight: bold; }
        .res-idx { position: absolute; top: -1px; left: 1px; font-size: 5px; color: #555; }

        .pattern-box { background: var(--bg); border-radius: 12px; padding: 10px; height: 120px; overflow-y: auto; border: 1px solid #23305c; }
        .pattern-title { color: var(--accent); text-align: center; font-weight: bold; font-size: 9px; margin-bottom: 5px; text-transform: uppercase; }
        .pattern-line { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 4px 0; font-size: 9px;}

        /* SEPARATEURS */
        .sep-500 { grid-column: span 10; background: var(--gold); color: #000; font-size: 9px; font-weight: 900; text-align: center; padding: 4px; margin: 10px 0; border-radius: 4px; }
        .sep-1000 { grid-column: span 10; background: var(--red); color: #fff; font-size: 10px; font-weight: 900; text-align: center; padding: 6px; margin: 12px 0; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1 class="app-title">Megawheel <span>Tracker</span></h1>
    </div>

    <div id="alert-zone">SYSTÈME PRÊT</div>

    <div class="numpad">
        <button class="num-btn" onclick="addNumber(1)">1<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(2)">2<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(5)">5<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(8)">8<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(10)">10<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(15)">15<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(20)">20<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(30)">30<span>Add</span></button>
        <button class="num-btn" onclick="addNumber(40)">40<span>Add</span></button>
    </div>

    <div class="action-row">
        <button class="del-btn" onclick="deleteLast()">SUPPRIMER DERNIER</button>
        <div class="tabs">
            <button id="btn-live" class="tab-btn active" onclick="switchTab('live')">LIVE</button>
            <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">ARCHIVES</button>
        </div>
    </div>

    <div id="live-view" class="view-content active">
        <div id="grid-live" class="res-grid"></div>
    </div>

    <div id="archive-view" class="view-content">
        <div id="grid-archive" class="res-grid"></div>
    </div>

    <div class="pattern-box">
        <div class="pattern-title">TOP PATTERNS (SÉQUENCES DE 5)</div>
        <div id="patternList"></div>
    </div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, dur) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.start();
        setTimeout(() => osc.stop(), dur);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        document.getElementById(tab + '-view').classList.add('active');
    }

    function addNumber(val) {
        results.unshift(val);
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        if(confirm("Supprimer le tour " + results[0] + " ?")) {
            results.shift();
            localStorage.setItem("mw_final_v7", JSON.stringify(results));
            updateUI();
        }
    }

    function updateUI() {
        const liveGrid = document.getElementById("grid-live");
        liveGrid.innerHTML = results.slice(0, 250).map((n, i) => `<div class="res-item"><span class="res-idx">${i + 1}</span>${n}</div>`).join('');

        const arcGrid = document.getElementById("grid-archive");
        let arcHTML = "";
        for (let i = 0; i < results.length; i++) {
            if (i > 0 && i % 1000 === 0) arcHTML += `<div class="sep-1000">🚨 PALIER ${i} TOURS</div>`;
            else if (i > 0 && i % 500 === 0) arcHTML += `<div class="sep-500">📍 ZONE ${i} TOURS</div>`;
            arcHTML += `<div class="res-item"><span class="res-idx">${i + 1}</span>${results[i]}</div>`;
        }
        arcGrid.innerHTML = arcHTML || "<div style='text-align:center; padding:20px; color:#444;'>Vide</div>";
        
        checkAlerts();
        updatePatterns();
    }

    function checkAlerts() {
        const az = document.getElementById("alert-zone");
        let alerts = [];
        const d1=results.indexOf(1), d2=results.indexOf(2), d5=results.indexOf(5), d8=results.indexOf(8);
        
        if(d1 > 10) alerts.push("1 ("+d1+"t)");
        if(d2 > 20) alerts.push("2 ("+d2+"t)");
        if(d5 > 40) alerts.push("5 ("+d5+"t)");
        if(d8 > 40) alerts.push("8 ("+d8+"t)");

        if(alerts.length > 0) {
            az.innerHTML = "⚠️ ALERTE : " + alerts.join(" | ");
            az.classList.add("active-alert");
            beep(600, 100);
        } else {
            az.innerHTML = "SYSTÈME PRÊT • " + results.length + " TOURS ANALYSÉS";
            az.classList.remove("active-alert");
        }
    }

    function updatePatterns() {
        if(results.length < 10) return;
        let patterns = {};
        for(let i=0; i <= results.length - 5; i++) {
            let p = results.slice(i, i+5).join("-");
            patterns[p] = (patterns[p] || 0) + 1;
        }
        let sorted = Object.entries(patterns).filter(p => p[1] > 1).sort((a,b) => b[1] - a[1]).slice(0, 8);
        document.getElementById("patternList").innerHTML = sorted.map(p => {
            let seq = p[0].split('-').reverse().join('→');
            return `<div class="pattern-line"><span>${seq}</span> <b style="color:var(--gold)">${p[1]}x</b></div>`;
        }).join('');
    }

    window.onload = updateUI;
</script>
</body>
</html>
