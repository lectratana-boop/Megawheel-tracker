<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker - Elite v14.1</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
            --out-shadow: 8px 8px 16px #0d1220, -4px -4px 12px #23305c;
            --in-shadow: inset 4px 4px 8px #0d1220, inset -2px -2px 6px #23305c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; overflow: hidden; height: 100vh;}
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 15px; border-radius: 25px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; }
        
        /* Header avec Image à droite */
        .app-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #23305c; 
            padding-bottom: 10px; 
        }
        .app-title { font-size: 1.1rem; font-weight: 900; color: var(--white); text-transform: uppercase; letter-spacing: 1px; }
        .app-title span { color: var(--accent); }
        .app-img { width: 45px; height: 45px; border-radius: 10px; border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(241, 196, 15, 0.3); }

        /* Onglets */
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--bg); color: #555; font-weight: bold; cursor: pointer; box-shadow: var(--out-shadow); font-size: 10px; }
        .tab-btn.active { color: var(--accent); box-shadow: var(--in-shadow); border: 1px solid var(--accent); }

        #alert-zone { min-height: 35px; background: rgba(255, 71, 87, 0.05); border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--red); border: 1px solid #222; text-align: center; }
        .active-alert { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.2) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .header-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-3d { flex: 2; background: var(--bg); border-radius: 12px; box-shadow: var(--in-shadow); }
        select { background: none; border: none; color: var(--accent); width: 100%; font-weight: bold; padding: 12px; font-size: 16px; outline: none; -webkit-appearance: none; }
        
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 11px; height: 45px; }
        .add-btn { background: var(--accent); color: #1a1a2e; flex: 1.2; }
        .del-btn { background: var(--red); color: white; flex: 0.8; opacity: 0.8;}

        .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .analyser-btn { background: linear-gradient(145deg, #1e1e3f, #16213e); color: var(--gold); border: 1px solid var(--gold); padding: 8px 2px; }

        .view-content { display: none; background: var(--bg); border-radius: 15px; padding: 10px; box-shadow: var(--in-shadow); flex: 1; overflow-y: auto; margin-bottom: 10px; border: 1px solid #222; }
        .view-content.active { display: block; }

        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .res-item { background: var(--card); font-size: 9px; padding: 8px 0; text-align: center; border-radius: 4px; color: var(--accent); position: relative; font-weight: bold; }
        .res-idx { position: absolute; top: -1px; left: 1px; font-size: 5px; color: #555; }

        .sep-500 { grid-column: span 10; background: var(--gold); color: black; font-size: 9px; font-weight: 900; text-align: center; padding: 5px; margin: 12px 0 5px 0; border-radius: 4px; }
        .sep-1000 { grid-column: span 10; background: var(--red); color: white; font-size: 10px; font-weight: 900; text-align: center; padding: 7px; margin: 15px 0 5px 0; border-radius: 4px; }

        .pattern-box { background: var(--bg); border-radius: 15px; padding: 12px; box-shadow: var(--in-shadow); flex: 0.9; overflow-y: auto; border: 1px solid #23305c; margin-top: auto;}
        .pattern-title { color: var(--accent); text-align: center; font-weight: bold; font-size: 10px; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #23305c; padding-bottom: 5px;}
        .pattern-line { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 5px 0; font-size: 9px;}
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="app-title">Megawheel <span>Tracker</span></div>
        <img src="image_32a564.png" alt="Logo" class="app-img">
    </div>

    <div class="tabs">
        <button id="btn-live" class="tab-btn active" onclick="switchTab('live')">LIVE (250)</button>
        <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">ARCHIVES (5000)</button>
    </div>

    <div id="alert-zone">SYSTÈME PRÊT</div>

    <div class="header-row">
        <div class="input-3d"><select id="numIn">
            <option value="">N°</option>
            <option>1</option><option>2</option><option>5</option><option>8</option>
            <option>10</option><option>15</option><option>20</option><option>30</option><option>40</option>
        </select></div>
        <button class="btn add-btn" onclick="addNumber()">AJOUTER</button>
        <button class="btn del-btn" onclick="deleteLast()">DEL</button>
    </div>

    <div class="stat-grid-4">
        <button class="btn analyser-btn" onclick="fullAnalysis(1)">ST1</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(2)">ST2</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(5)">ST5</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(8)">ST8</button>
    </div>

    <div id="live-view" class="view-content active">
        <div id="grid-live" class="res-grid"></div>
    </div>

    <div id="archive-view" class="view-content">
        <div id="grid-archive" class="res-grid"></div>
    </div>

    <div class="pattern-box">
        <div class="pattern-title">TOP PATTERNS (SÉQUENCES DE 5)</div>
        <div id="patternList"></div>
    </div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    const values = [1,2,5,8,10,15,20,30,40];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, dur) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.start();
        setTimeout(() => osc.stop(), dur);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        if(tab === 'live') {
            document.getElementById('btn-live').classList.add('active');
            document.getElementById('live-view').classList.add('active');
        } else {
            document.getElementById('btn-archive').classList.add('active');
            document.getElementById('archive-view').classList.add('active');
        }
    }

    function addNumber() {
        const val = document.getElementById("numIn").value;
        if(!val) return;
        results.unshift(parseInt(val));
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        if(confirm("Supprimer dernier tour ?")) {
            results.shift();
            localStorage.setItem("mw_final_v7", JSON.stringify(results));
            updateUI();
        }
    }

        const liveGrid = document.getElementById
