<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker Pro - Expert</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --out-shadow: 8px 8px 16px #0d1220, -4px -4px 12px #23305c;
            --in-shadow: inset 4px 4px 8px #0d1220, inset -2px -2px 6px #23305c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 15px; display: flex; justify-content: center; overflow-x: hidden; }
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 20px; border-radius: 25px; box-shadow: var(--out-shadow); }
        
        .app-title { text-align: center; font-size: 1.2rem; font-weight: 900; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }

        .header-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-3d { flex: 1; background: var(--bg); border-radius: 12px; box-shadow: var(--in-shadow); padding: 5px; }
        select { background: none; border: none; color: var(--accent); width: 100%; font-weight: bold; padding: 10px; font-size: 16px; outline: none; -webkit-appearance: none; }
        
        .btn { border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: var(--out-shadow); text-transform: uppercase; -webkit-tap-highlight-color: transparent; }
        .btn:active { box-shadow: var(--in-shadow); transform: translateY(2px); }
        .add-btn { background: var(--accent); color: #1a1a2e; padding: 12px 20px; font-size: 12px; }
        
        .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .analyser-btn { background: linear-gradient(145deg, #1e1e3f, #16213e); color: var(--gold); border: 1px solid var(--gold); padding: 12px 2px; font-size: 9px; }

        .archive-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: var(--bg); padding: 8px; border-radius: 10px; box-shadow: var(--in-shadow); }
        .archive-controls label { font-size: 10px; color: #888; }
        .archive-select { background: none; border: none; color: var(--accent); font-weight: bold; font-size: 11px; width: auto; cursor: pointer; }

        .box-3d-large { background: var(--bg); border-radius: 15px; padding: 15px; box-shadow: var(--in-shadow); margin-bottom: 15px; height: 180px; overflow-y: auto; }
        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
        .res-item { background: var(--card); font-size: 10px; padding: 6px 0; text-align: center; border-radius: 4px; color: var(--accent); position: relative; font-weight: bold; }
        .res-idx { position: absolute; top: -2px; left: 1px; font-size: 5px; color: #444; }

        .box-3d-stats { background: var(--bg); border-radius: 15px; padding: 10px; box-shadow: var(--in-shadow); display: flex; gap: 10px; height: 100px; margin-bottom: 15px; }
        .chart-wrap { flex: 1.5; position: relative; }
        .list-wrap { flex: 1; overflow-y: auto; font-size: 9px; border-left: 1px solid #222; padding-left: 5px; }

        .danger-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .simu-btn { background: #34495e; color: white; padding: 10px; font-size: 9px; }
        .reset-btn { background: #c0392b; color: white; padding: 10px; font-size: 9px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-title">Tracker Expert v9</div>

    <div class="header-row">
        <div class="input-3d"><select id="numIn">
            <option value="">N° SORTANT</option>
            <option>1</option><option>2</option><option>5</option><option>8</option>
            <option>10</option><option>15</option><option>20</option><option>30</option><option>40</option>
        </select></div>
        <button class="btn add-btn" onclick="addNumber()">AJOUTER</button>
    </div>

    <div class="stat-grid-4">
        <button class="btn analyser-btn" onclick="fullAnalysis(1)">STAT 1</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(2)">STAT 2</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(5)">STAT 5</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(8)">STAT 8</button>
    </div>

    <div class="archive-controls">
        <label>TRANCHE :</label>
        <select id="archiveRange" class="archive-select" onchange="updateUI()">
            <option value="0">1 - 500</option>
            <option value="500">501 - 1000</option>
            <option value="1000">1001 - 1500</option>
            <option value="1500">1501 - 2000</option>
            <option value="2000">2001 - 2500</option>
            <option value="2500">2501 - 3000</option>
            <option value="3000">3001 - 3500</option>
            <option value="3500">3501 - 4000</option>
            <option value="4000">4001 - 4500</option>
            <option value="4500">4501 - 5000</option>
        </select>
    </div>

    <div class="box-3d-large">
        <div id="grid" class="res-grid"></div>
    </div>

    <div class="box-3d-stats">
        <div class="chart-wrap"><canvas id="chart"></canvas></div>
        <div id="statList" class="list-wrap"></div>
    </div>

    <div class="danger-zone">
        <button class="btn simu-btn" onclick="simulate5000()">📊 SIMU 5000</button>
        <button class="btn reset-btn" onclick="resetDatabase()">⚠️ RESET</button>
    </div>
    <div style="text-align: center; font-size: 9px; color: #444; margin-top: 10px;">Mémoire active : <span id="count">0</span> tours</div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    let chartInstance = null;
    const values = [1,2,5,8,10,15,20,30,40];

    function vibrate(ms = 50) { if (navigator.vibrate) navigator.vibrate(ms); }
    function save() { localStorage.setItem("mw_final_v7", JSON.stringify(results)); }

    function addNumber() {
        vibrate(40);
        const val = document.getElementById("numIn").value;
        if(!val) return;
        results.unshift(parseInt(val));
        if(results.length > 5000) results.pop();
        save();
        updateUI();
    }

    function fullAnalysis(num) {
        vibrate(60);
        if(results.length === 0) { alert("Base de données vide."); return; }

        const currentDelay = results.indexOf(num);
        const freq100 = results.slice(0, 100).filter(n => n === num).length;
        const freq200 = results.slice(0, 200).filter(n => n === num).length;

        // Calcul exact du Record Absence et de sa position
        let maxDelay = 0;
        let tempDelay = 0;
        let recordEndIdx = 0;

        for (let i = 0; i < results.length; i++) {
            if (results[i] === num) {
                if (tempDelay > maxDelay) {
                    maxDelay = tempDelay;
                    recordEndIdx = i; // Fin de la séquence
                }
                tempDelay = 0;
            } else {
                tempDelay++;
            }
        }
        // Vérification de la fin de liste
        if (tempDelay > maxDelay) {
            maxDelay = tempDelay;
            recordEndIdx = results.length;
        }

        const tourDebut = recordEndIdx - maxDelay + 1;
        const tourFin = recordEndIdx;

        alert(
            "📊 BILAN EXPERT - NUMÉRO " + num + "\n" +
            "----------------------------\n" +
            "⏳ RETARD ACTUEL : " + (currentDelay === -1 ? "ABSENT" : currentDelay + " tours") + "\n\n" +
            "📈 FRÉQUENCE (100t) : " + freq100 + " sorties\n" +
            "📈 FRÉQUENCE (200t) : " + freq200 + " sorties\n\n" +
            "🏆 RECORD ABSENCE : " + maxDelay + " tours\n" +
            "📍 SITUÉ : Entre tour " + tourDebut + " et tour " + tourFin
        );
    }

    function updateUI() {
        document.getElementById("count").innerText = results.length;
        const offset = parseInt(document.getElementById("archiveRange").value);
        const grid = document.getElementById("grid");
        
        const slice = results.slice(offset, offset + 500);
        grid.innerHTML = slice.map((n, i) => `
            <div class="res-item">
                <span class="res-idx">${offset + i + 1}</span>
                ${n}
            </div>
        `).join('');

        const counts = values.map(v => results.filter(r => r === v).length);
        const total = results.length || 1;
        document.getElementById("statList").innerHTML = values.map((v, i) => `
            <div style="display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #222;">
                <b>${v}</b> <span>${counts[i]} (${((counts[i]/total)*100).toFixed(0)}%)</span>
            </div>
        `).join('');

        try {
            const ctx = document.getElementById('chart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: values, datasets: [{ data: counts, backgroundColor: '#00ffcc', borderRadius: 3 }] },
                options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{display:false},x:{ticks:{color:'#555',font:{size:8}},grid:{display:false}}} }
            });
        } catch(e){}
    }

    function simulate5000() {
        if(!confirm("Générer 5000 tours aléatoires ?")) return;
        results = Array.from({length: 5000}, () => values[Math.floor(Math.random() * values.length)]);
        save();
        updateUI();
    }

    function resetDatabase() {
        if(confirm("Vider toute la mémoire ?")) {
            results = [];
            save();
            updateUI();
        }
    }

    window.onload = updateUI;
</script>
</body>
</html>
