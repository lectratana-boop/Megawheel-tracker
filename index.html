<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Fast Predictor v19.0</title>
    <style>
        :root {
            --bg: #05050a;
            --card: #121225;
            --accent: #00ffcc;
            --blue: #4d94ff;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 5px; overflow: hidden; }
        .container { width: 100%; max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 5px; }

        /* PAVÉ NUMÉRIQUE COMPACT POUR VITESSE */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .num-btn { 
            background: linear-gradient(145deg, #1e2a4a, #121225);
            border: 1px solid #23305c; color: var(--white);
            font-size: 1.5rem; font-weight: 900; padding: 15px 0;
            border-radius: 12px; cursor: pointer;
            touch-action: manipulation; /* Élimine le délai de clic mobile */
        }
        .num-btn:active { background: var(--accent); color: #000; }

        /* ZONE PREDICTOR ULTRA-VISIBLE */
        .predictor-box { 
            background: #000; border: 2px solid var(--blue); border-radius: 15px; 
            padding: 12px; box-shadow: 0 0 15px rgba(77, 148, 255, 0.4);
        }
        .predictor-title { color: var(--blue); text-align: center; font-weight: 900; font-size: 14px; margin-bottom: 10px; text-transform: uppercase; }
        
        .pred-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .pred-num-tag { background: var(--blue); color: #fff; padding: 5px; border-radius: 6px; font-weight: 900; font-size: 16px; min-width: 35px; text-align: center; }
        .pred-bar-wrapper { flex-grow: 1; height: 12px; background: #222; border-radius: 6px; overflow: hidden; }
        .pred-bar-active { height: 100%; background: linear-gradient(90deg, var(--blue), var(--accent)); transition: width 0.3s ease; }
        .pred-percent-tag { color: var(--accent); font-weight: 900; font-size: 18px; min-width: 55px; text-align: right; }

        /* ALERTES */
        #alert-zone { font-size: 10px; text-align: center; color: #555; padding: 2px; height: 15px; overflow: hidden; }
        .critical { color: var(--red) !important; font-weight: bold; }

        /* VUE HISTORIQUE RÉDUITE */
        .history-mini { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; background: #000; padding: 5px; border-radius: 8px; height: 60px; overflow-y: auto; }
        .res-item { font-size: 9px; text-align: center; color: var(--accent); border: 1px solid #111; padding: 2px 0; }
        
        .del-btn { background: none; border: 1px solid #333; color: #555; font-size: 10px; padding: 5px; border-radius: 5px; margin-top: 5px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="numpad">
        <button class="num-btn" onclick="quickAdd(1)">1</button>
        <button class="num-btn" onclick="quickAdd(2)">2</button>
        <button class="num-btn" onclick="quickAdd(5)">5</button>
        <button class="num-btn" onclick="quickAdd(8)">8</button>
        <button class="num-btn" onclick="quickAdd(10)">10</button>
        <button class="num-btn" onclick="quickAdd(15)">15</button>
        <button class="num-btn" onclick="quickAdd(20)">20</button>
        <button class="num-btn" onclick="quickAdd(30)">30</button>
        <button class="num-btn" onclick="quickAdd(40)">40</button>
    </div>

    <div id="alert-zone">PRET / CALCUL INSTANTANÉ</div>

    <div class="predictor-box">
        <div class="predictor-title">CONVERGENCE & TENDANCE</div>
        <div id="predictorDisplay">
            </div>
    </div>

    <div class="history-mini" id="grid-live"></div>
    <button class="del-btn" onclick="deleteLast()">EFFACER ERREUR</button>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];

    function quickAdd(val) {
        results.unshift(val);
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        results.shift();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function updateUI() {
        // MAJ Historique rapide
        document.getElementById("grid-live").innerHTML = results.slice(0, 30).map(n => 
            `<div class="res-item">${n}</div>`
        ).join('');
        
        calculateBalancedPredictor();
        checkAlerts();
    }

    function checkAlerts() {
        const az = document.getElementById("alert-zone");
        let d1 = results.indexOf(1);
        if(d1 >= 10) {
            az.innerHTML = `<span class="critical">ALERTE : 1 absent depuis ${d1} tours</span>`;
        } else {
            az.innerHTML = "ANALYSE ACTIVE : " + results.length + " TOURS";
        }
    }

    function calculateBalancedPredictor() {
        if (results.length === 0) return;

        const allNums = [1, 2, 5, 8, 10, 15, 20, 30, 40];
        const recent50 = results.slice(0, 50);
        let scores = [];

        allNums.forEach(num => {
            // Logique Tendance (40%)
            let freqRecent = recent50.filter(x => x === num).length / (recent50.length || 1);
            
            // Logique Retard (60%)
            let delay = results.indexOf(num);
            if(delay === -1) delay = 100;
            let theoreticalFreq = (num === 1) ? 0.38 : (num === 2 ? 0.25 : 0.1); 
            let delayWeight = (delay * theoreticalFreq) * 2;

            let finalScore = (freqRecent * 100) + delayWeight;
            scores.push({ num, score: finalScore });
        });

        // Top 3
        let top3 = scores.sort((a, b) => b.score - a.score).slice(0, 3);
        let total = top3.reduce((a, b) => a + b.score, 0);

        let p1 = Math.round((top3[0].score / total) * 100);
        let p2 = Math.round((top3[1].score / total) * 100);
        let p3 = 100 - (p1 + p2);

        document.getElementById("predictorDisplay").innerHTML = top3.map((item, i) => {
            let p = (i === 0) ? p1 : (i === 1 ? p2 : p3);
            return `
                <div class="pred-line">
                    <div class="pred-num-tag">${item.num}</div>
                    <div class="pred-bar-wrapper"><div class="pred-bar-active" style="width: ${p}%"></div></div>
                    <div class="pred-percent-tag">${p}%</div>
                </div>
            `;
        }).join('');
    }

    // Lancer au démarrage pour charger les 5000 numéros existants
    updateUI();
</script>
</body>
</html>
