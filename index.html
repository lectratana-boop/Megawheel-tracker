<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker v14.5</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
            --out-shadow: 8px 8px 16px #0d1220, -4px -4px 12px #23305c;
            --in-shadow: inset 4px 4px 8px #0d1220, inset -2px -2px 6px #23305c;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 15px; border-radius: 25px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; }
        
        .app-header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid #23305c; padding-bottom: 10px; }
        .app-title { font-size: 1.3rem; font-weight: 900; color: var(--white); text-transform: uppercase; letter-spacing: 2px; }
        .app-title span { color: var(--accent); }

        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: var(--bg); color: #555; font-weight: bold; cursor: pointer; box-shadow: var(--out-shadow); font-size: 10px; }
        .tab-btn.active { color: var(--accent); box-shadow: var(--in-shadow); border: 1px solid var(--accent); }

        #alert-zone { min-height: 35px; background: rgba(255, 71, 87, 0.05); border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; color: var(--red); border: 1px solid #222; text-align: center; }
        .active-alert { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.3) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.4; } }

        .header-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .input-3d { flex: 2; background: var(--bg); border-radius: 12px; box-shadow: var(--in-shadow); border: 1px solid #23305c; }
        select { background: none; border: none; color: var(--accent); width: 100%; font-weight: bold; padding: 12px; font-size: 18px; outline: none; text-align: center; cursor: pointer; }
        
        .btn { border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 11px; height: 45px; transition: active 0.1s; }
        .btn:active { transform: scale(0.95); }
        .add-btn { background: var(--accent); color: #1a1a2e; flex: 1.2; }
        .del-btn { background: var(--red); color: white; flex: 0.8; }

        .stat-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .analyser-btn { background: linear-gradient(145deg, #1e1e3f, #16213e); color: var(--gold); border: 1px solid var(--gold); }

        .view-content { display: none; background: var(--bg); border-radius: 15px; padding: 10px; height: 320px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #222; box-shadow: var(--in-shadow); }
        .view-content.active { display: block; }

        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
        .res-item { background: var(--card); font-size: 10px; padding: 8px 0; text-align: center; border-radius: 4px; color: var(--accent); position: relative; font-weight: bold; }
        .res-idx { position: absolute; top: -1px; left: 1px; font-size: 5px; color: #555; }

        .sep-500 { grid-column: span 10; background: var(--gold); color: #000; font-size: 10px; font-weight: 900; text-align: center; padding: 8px; margin: 15px 0 5px 0; border-radius: 4px; text-transform: uppercase; }
        .sep-1000 { grid-column: span 10; background: var(--red); color: #fff; font-size: 11px; font-weight: 900; text-align: center; padding: 10px; margin: 20px 0 5px 0; border-radius: 4px; text-transform: uppercase; box-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }

        .pattern-box { background: var(--bg); border-radius: 15px; padding: 12px; box-shadow: var(--in-shadow); min-height: 180px; border: 1px solid #23305c; }
        .pattern-title { color: var(--accent); text-align: center; font-weight: bold; font-size: 10px; margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px solid #23305c; padding-bottom: 5px;}
        .pattern-line { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 6px 0; font-size: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <div class="app-title">Megawheel <span>Tracker</span></div>
    </div>

    <div class="tabs">
        <button id="btn-live" class="tab-btn active" onclick="switchTab('live')">LIVE (250)</button>
        <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">ARCHIVES (5000)</button>
    </div>

    <div id="alert-zone">SYSTÈME PRÊT</div>

    <div class="header-row">
        <div class="input-3d"><select id="numIn">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="5">5</option>
            <option value="8">8</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
            <option value="30">30</option>
            <option value="40">40</option>
        </select></div>
        <button class="btn add-btn" onclick="addNumber()">AJOUTER</button>
        <button class="btn del-btn" onclick="deleteLast()">DEL</button>
    </div>

    <div class="stat-grid-4">
        <button class="btn analyser-btn" onclick="fullAnalysis(1)">ST1</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(2)">ST2</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(5)">ST5</button>
        <button class="btn analyser-btn" onclick="fullAnalysis(8)">ST8</button>
    </div>

    <div id="live-view" class="view-content active">
        <div id="grid-live" class="res-grid"></div>
    </div>

    <div id="archive-view" class="view-content">
        <div id="grid-archive" class="res-grid"></div>
    </div>

    <div class="pattern-box">
        <div class="pattern-title">TOP PATTERNS (SÉQUENCES RÉPÉTÉES)</div>
        <div id="patternList"></div>
    </div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    const values = [1,2,5,8,10,15,20,30,40];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(freq, dur) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = freq; osc.start();
        setTimeout(() => osc.stop(), dur);
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        document.getElementById(tab + '-view').classList.add('active');
    }

    function updateUI() {
        const liveGrid = document.getElementById("grid-live");
        liveGrid.innerHTML = results.slice(0, 250).map((n, i) => `<div class="res-item"><span class="res-idx">${i + 1}</span>${n}</div>`).join('');

        const arcGrid = document.getElementById("grid-archive");
        let arcHTML = "";
        for (let i = 0; i < results.length; i++) {
            if (i > 0 && i % 1000 === 0) arcHTML += `<div class="sep-1000">🚨 PALIER ${i} TOURS 🚨</div>`;
            else if (i > 0 && i % 500 === 0) arcHTML += `<div class="sep-500">📍 ZONE ${i} TOURS</div>`;
            arcHTML += `<div class="res-item"><span class="res-idx">${i + 1}</span>${results[i]}</div>`;
        }
        arcGrid.innerHTML = arcHTML || "<div style='grid-column: span 10; text-align:center; padding:20px; color:#444;'>Aucune donnée</div>";
        
        checkAlerts();
        updatePatterns();
    }

    function addNumber() {
        const select = document.getElementById("numIn");
        const val = select.value;
        if(!val) return;
        
        results.unshift(parseInt(val));
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        
        updateUI();
        // IMPORTANT : On ne vide plus le select. Le numéro reste affiché pour un clic multiple.
    }

    function deleteLast() {
        if(results.length === 0) return;
        if(confirm("Effacer le tour " + results[0] + " ?")) {
            results.shift();
            localStorage.setItem("mw_final_v7", JSON.stringify(results));
            updateUI();
        }
    }

    function checkAlerts() {
        const az = document.getElementById("alert-zone");
        let alerts = [];
        const d1=results.indexOf(1), d2=results.indexOf(2), d5=results.indexOf(5), d8=results.indexOf(8);
        
        if(d1 > 10) alerts.push("1 ("+d1+"t)");
        if(d2 > 20) alerts.push("2 ("+d2+"t)");
        if(d5 > 40) alerts.push("5 ("+d5+"t)");
        if(d8 > 40) alerts.push("8 ("+d8+"t)");

        if(alerts.length > 0) {
            az.innerHTML = "⚠️ ALERTE : " + alerts.join(" | ");
            az.classList.add("active-alert");
            beep(600, 150);
        } else {
            az.innerHTML = "SYSTÈME PRÊT • " + results.length + " TOURS";
            az.classList.remove("active-alert");
        }
    }

    function fullAnalysis(num) {
        if(results.length === 0) return;
        const currentDelay = results.indexOf(num);
        let maxDelay = 0, tempDelay = 0;
        for (let i = 0; i < results.length; i++) {
            if (results[i] === num) {
                if (tempDelay > maxDelay) maxDelay = tempDelay;
                tempDelay = 0;
            } else tempDelay++;
        }
        alert("ANALYSE N°" + num + "\nRetard actuel: " + (currentDelay === -1 ? "N/A" : currentDelay) + "\nRecord d'absence: " + maxDelay + " tours");
    }

    function updatePatterns() {
        if(results.length < 10) return;
        let patterns = {};
        for(let i=0; i <= results.length - 5; i++) {
            let p = results.slice(i, i+5).join("-");
            patterns[p] = (patterns[p] || 0) + 1;
        }
        let sorted = Object.entries(patterns).filter(p => p[1] > 1).sort((a,b) => b[1] - a[1]).slice(0, 12);
        document.getElementById("patternList").innerHTML = sorted.map(p => {
            let seq = p[0].split('-').reverse().join('→');
            return `<div class="pattern-line"><span>${seq}</span> <b style="color:var(--gold)">${p[1]}x</b></div>`;
        }).join('');
    }

    window.onload = updateUI;
</script>
</body>
</html>
