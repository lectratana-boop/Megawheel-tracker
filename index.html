<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker PRO v15.4</title>
    <style>
        :root {
            --bg: #0a0e1a;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
            --btn-bg: linear-gradient(145deg, #1e2a4a, #16213e);
            --out-shadow: 3px 3px 6px #050810, -1px -1px 4px #1e2a4a;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 5px; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 420px; background: var(--card); padding: 8px; border-radius: 12px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; height: 98vh; gap: 3px; }
        
        /* HEADER COMPACT */
        .app-header { text-align: center; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; }
        .app-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin: 0; color: var(--accent); }
        
        #alert-zone { min-height: 20px; background: rgba(255, 71, 87, 0.1); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: var(--red); border: 1px solid #333; margin: 2px 0; }
        .active-alert { border-color: var(--red) !important; background: rgba(255, 71, 87, 0.25) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* ANALYSE (HAUT) */
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; }
        .st-btn { background: var(--btn-bg); border: 1px solid var(--gold); border-radius: 5px; padding: 4px 1px; display: flex; flex-direction: column; align-items: center; color: var(--gold); }
        .st-btn .st-label { font-size: 8px; font-weight: 900; }
        .st-btn .st-now { font-size: 12px; font-weight: 900; color: var(--accent); }
        .st-btn .st-val { font-size: 7px; color: #bbb; line-height: 1; }

        .pattern-box { background: var(--bg); border-radius: 5px; padding: 4px; height: 75px; overflow-y: auto; border: 1px solid #1e2a4a; }
        .pattern-title { color: var(--accent); text-align: center; font-weight: bold; font-size: 8px; margin-bottom: 2px; text-transform: uppercase; border-bottom: 1px solid #1e2a4a; }
        .pattern-line { display: flex; justify-content: space-between; border-bottom: 1px solid #111; padding: 1px 0; font-size: 8px;}

        /* HISTORIQUE AGRANDI (TOUT L'ESPACE CENTRAL) */
        .history-section { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; margin: 2px 0; }
        .tabs { display: flex; gap: 3px; margin-bottom: 2px; }
        .tab-btn { flex: 1; padding: 4px; border-radius: 4px; border: none; background: var(--bg); color: #555; font-size: 9px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: var(--accent); border: 1px solid var(--accent); }
        
        .view-content { flex-grow: 1; background: var(--bg); border-radius: 4px; padding: 5px; overflow-y: auto; border: 1px solid #1e2a4a; }
        .res-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 3px; align-content: start; }
        .res-item { background: var(--card); font-size: 12px; padding: 6px 0; text-align: center; border-radius: 3px; color: var(--accent); font-weight: 900; position: relative; border: 1px solid #1e2a4a; }
        .res-idx { position: absolute; top: 1px; left: 1px; font-size: 6px; color: #555; }

        /* PAVÉ ET EFFACER (BAS) */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding-top: 2px; }
        .num-btn { background: var(--btn-bg); border: 1px solid #1e2a4a; color: var(--white); font-size: 1.1rem; font-weight: 900; padding: 10px 0; border-radius: 6px; cursor: pointer; }
        .num-btn:active { background: var(--accent); color: #000; }
        
        .del-btn { background: var(--red); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 10px; cursor: pointer; grid-column: span 3; padding: 10px; margin-top: 2px; text-transform: uppercase; box-shadow: var(--out-shadow); }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1 class="app-title">MW Tracker <span>PRO v15.4</span></h1>
        <div style="font-size: 8px; color: var(--gold)" id="tour-count">0 TOURS</div>
    </div>
    
    <div id="alert-zone">SYSTÈME PRÊT</div>

    <div class="stat-grid" id="stat-container"></div>
    
    <div class="pattern-box">
        <div class="pattern-title">PATTERNS RÉCURRENTS</div>
        <div id="patternList"></div>
    </div>

    <div class="history-section">
        <div class="tabs">
            <button id="btn-live" class="tab-btn active" onclick="switchTab('live')">LIVE (250)</button>
            <button id="btn-archive" class="tab-btn" onclick="switchTab('archive')">HISTORIQUE (5000)</button>
        </div>
        <div id="main-view" class="view-content">
            <div id="grid-content" class="res-grid"></div>
        </div>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="addNumber(1)">1</button>
        <button class="num-btn" onclick="addNumber(2)">2</button>
        <button class="num-btn" onclick="addNumber(5)">5</button>
        <button class="num-btn" onclick="addNumber(8)">8</button>
        <button class="num-btn" onclick="addNumber(10)">10</button>
        <button class="num-btn" onclick="addNumber(15)">15</button>
        <button class="num-btn" onclick="addNumber(20)">20</button>
        <button class="num-btn" onclick="addNumber(30)">30</button>
        <button class="num-btn" onclick="addNumber(40)">40</button>
        <button class="del-btn" onclick="deleteLast()">EFFACER DERNIER TOUR</button>
    </div>
</div>

<script>
    // Utilisation de la clé universelle pour charger vos données
    let results = JSON.parse(localStorage.getItem("mw_final_v15")) || [];
    let currentTab = 'live';

    function triggerVibration(pattern) { if ("vibrate" in navigator) navigator.vibrate(pattern); }

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + tab).classList.add('active');
        updateUI();
    }

    function addNumber(val) {
        triggerVibration(40);
        results.unshift(val);
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v15", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        triggerVibration(80);
        results.shift();
        localStorage.setItem("mw_final_v15", JSON.stringify(results));
        updateUI();
    }

    function getStats(num) {
        const last50 = results.slice(0, 50).filter(x => x === num).length;
        const last100 = results.slice(0, 100).filter(x => x === num).length;
        const currentDelay = results.indexOf(num);
        let maxDelay = 0; let temp = 0;
        for(let r of results) {
            if(r === num) { if(temp > maxDelay) maxDelay = temp; temp = 0; } 
            else { temp++; }
        }
        return { delay: currentDelay === -1 ? '?' : currentDelay, f50: last50, f100: last100, max: maxDelay };
    }

    function updateUI() {
        // MAJ HISTORIQUE TOTAL
        const grid = document.getElementById("grid-content");
        let html = "";
        const data = currentTab === 'live' ? results.slice(0, 250) : results;
        
        data.forEach((n, i) => {
            // Mise en valeur des numéros ST
            const isST = [1, 2, 5, 8].includes(n) ? 'border: 1px solid var(--gold); color: var(--gold);' : '';
            html += `<div class="res-item" style="${isST}"><span class="res-idx">${i+1}</span>${n}</div>`;
        });
        
        grid.innerHTML = html || "<div style='grid-column:span 10; text-align:center; padding-top:20px; font-size:10px; color:#555;'>AUCUNE DONNÉE</div>";
        document.getElementById("tour-count").innerText = results.length + " TOURS";

        // MAJ STATS BOUTONS
        const targets = [1, 2, 5, 8];
        let statHTML = "";
        targets.forEach(t => {
            const s = getStats(t);
            statHTML += `
                <div class="st-btn">
                    <span class="st-label">ST ${t}</span>
                    <span class="st-now">${s.delay}T</span>
                    <span class="st-val">50t: ${s.f50} | 100t: ${s.f100}</span>
                    <span class="st-val">MAX: ${s.max}</span>
                </div>`;
        });
        document.getElementById("stat-container").innerHTML = statHTML;

        // ALERTES
        const az = document.getElementById("alert-zone");
        let alerts = [];
        [1,2,5,8].forEach(n => {
            const d = results.indexOf(n);
            const limit = n === 1 ? 12 : n === 2 ? 22 : 45;
            if(d > limit && d !== -1) alerts.push(`${n}(${d}t)`);
        });
        if(alerts.length > 0) {
            az.innerHTML = "⚠️ ALERTE ABSENCE : " + alerts.join(" | ");
            az.classList.add("active-alert");
        } else {
            az.innerHTML = "ANALYSE EN COURS...";
            az.classList.remove("active-alert");
        }
        updatePatterns();
    }

    function updatePatterns() {
        if(results.length < 6) return;
        let patterns = {};
        for(let i=0; i <= results.length - 5; i++) {
            let p = results.slice(i, i+5).join("-");
            patterns[p] = (patterns[p] || 0) + 1;
        }
        let sorted = Object.entries(patterns).filter(p => p[1] > 1).sort((a,b) => b[1] - a[1]).slice(0, 5);
        document.getElementById("patternList").innerHTML = sorted.map(p => {
            let seq = p[0].split('-').reverse().join('→');
            return `<div class="pattern-line"><span>${seq}</span> <b style="color:var(--gold)">${p[1]}x</b></div>`;
        }).join('');
    }

    window.onload = updateUI;
</script>
</body>
</html>
