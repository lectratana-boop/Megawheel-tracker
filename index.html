<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Predictor v18.0 - Profit Analyzer</title>
    <style>
        :root {
            --bg: #0d0d1a;
            --card: #16213e;
            --accent: #00ffcc;
            --gold: #f1c40f;
            --white: #ffffff;
            --red: #ff4757;
            --blue: #4d94ff;
            --out-shadow: 4px 4px 8px #05050a, -2px -2px 6px #1b2645;
            --in-shadow: inset 3px 3px 6px #05050a, inset -1px -1px 4px #1b2645;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 420px; background: var(--card); padding: 15px; border-radius: 20px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; gap: 8px; }
        
        .app-header { text-align: center; border-bottom: 2px solid #23305c; padding-bottom: 5px; }
        .app-title { font-size: 1rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .app-title span { color: var(--accent); }

        #alert-zone { 
            min-height: 45px; background: rgba(0, 0, 0, 0.4); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; color: #555; border: 1px solid #1a1a1a; text-align: center;
        }
        .active-alert { border-color: var(--red) !important; color: white !important; background: rgba(255, 71, 87, 0.3) !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.6; } }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 5px 0; }
        .num-btn { 
            background: linear-gradient(145deg, #1e2a4a, #16213e);
            border: 1px solid #23305c; color: var(--white);
            font-size: 1.4rem; font-weight: 900; padding: 18px 0;
            border-radius: 15px; cursor: pointer; box-shadow: var(--out-shadow);
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .num-btn:active { box-shadow: var(--in-shadow); transform: scale(0.95); color: var(--accent); }
        
        .del-btn { 
            grid-column: span 3; background: #1a1a2e; color: #999; border: 1px solid #333; 
            border-radius: 10px; font-weight: bold; font-size: 11px; padding: 10px;
            cursor: pointer; text-transform: uppercase; margin-top: 5px;
        }

        .predictor-box { 
            background: linear-gradient(180deg, #05050a 0%, #0d0d1a 100%); 
            border-radius: 15px; padding: 15px; border: 2px solid var(--blue); 
            margin-top: 5px; box-shadow: 0 0 20px rgba(77, 148, 255, 0.2);
        }
        .predictor-title { color: var(--blue); text-align: center; font-weight: 900; font-size: 13px; margin-bottom: 12px; text-transform: uppercase; }
        .pred-line { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .pred-num-tag { background: var(--blue); color: #fff; padding: 4px 10px; border-radius: 5px; font-weight: 900; font-size: 14px; min-width: 30px; text-align: center; }
        .pred-bar-wrapper { flex-grow: 1; margin: 0 15px; height: 10px; background: #111; border-radius: 5px; overflow: hidden; border: 1px solid #222;}
        .pred-bar-active { height: 100%; background: linear-gradient(90deg, var(--blue), var(--accent)); transition: width 0.4s ease-out; }
        .pred-percent-tag { color: var(--accent); font-weight: 900; font-family: monospace; font-size: 16px; min-width: 50px; text-align: right; }

        .stats-box { background: #000; border: 1px solid var(--gold); border-radius: 12px; padding: 12px; margin-top: 5px; }
        .stats-title { color: var(--gold); font-weight: bold; text-align: center; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
        .win { color: var(--accent); font-weight: bold; }
        .loss { color: var(--red); font-weight: bold; }

        .history-mini { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 8px; border-radius: 10px; height: 80px; overflow-y: auto; border: 1px solid #222; }
        .res-item { background: #111; font-size: 10px; padding: 5px 0; text-align: center; border-radius: 4px; color: var(--accent); font-weight: bold; border: 1px solid #222; }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1 class="app-title">Megawheel <span>Logic & Profit</span></h1>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="quickAdd(1)">1</button>
        <button class="num-btn" onclick="quickAdd(2)">2</button>
        <button class="num-btn" onclick="quickAdd(5)">5</button>
        <button class="num-btn" onclick="quickAdd(8)">8</button>
        <button class="num-btn" onclick="quickAdd(10)">10</button>
        <button class="num-btn" onclick="quickAdd(15)">15</button>
        <button class="num-btn" onclick="quickAdd(20)">20</button>
        <button class="num-btn" onclick="quickAdd(30)">30</button>
        <button class="num-btn" onclick="quickAdd(40)">40</button>
        <button class="del-btn" onclick="deleteLast()">Correction dernier tour</button>
    </div>

    <div id="alert-zone">ANALYSE EN COURS...</div>

    <div class="predictor-box">
        <div class="predictor-title">PREDICTOR BALANCED</div>
        <div id="predictorDisplay"></div>
    </div>

    <div class="stats-box">
        <div class="stats-title">Performance Stratégie (Num 2)</div>
        <div id="backtest-results"></div>
    </div>

    <div class="history-mini" id="grid-live"></div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    const grilleMise = { 1:500, 2:500, 3:500, 4:1000, 5:1000, 6:1000, 7:2000, 8:2000, 9:3500, 10:4500, 11:5000, 12:8500 };

    function quickAdd(val) {
        results.unshift(val);
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        results.shift();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function updateUI() {
        document.getElementById("grid-live").innerHTML = results.slice(0, 50).map(n => `<div class="res-item">${n}</div>`).join('');
        checkAlerts();
        calculateBalancedPredictor();
        runBacktest();
    }

    function checkAlerts() {
        const az = document.getElementById("alert-zone");
        let d1 = results.indexOf(1);
        if(d1 >= 10) {
            az.innerHTML = "🚨 RETARD CRITIQUE : 1 (" + d1 + "t)";
            az.classList.add("active-alert");
        } else {
            az.innerHTML = "LOGIQUE ACTIVE • " + results.length + " TOURS";
            az.classList.remove("active-alert");
        }
    }

    function calculateBalancedPredictor() {
        if (results.length < 5) return;
        const allNums = [1, 2, 5, 8, 10, 15, 20, 30, 40];
        const recent50 = results.slice(0, 50);
        let scores = [];

        allNums.forEach(num => {
            let freqRecent = recent50.filter(x => x === num).length / recent50.length;
            let delay = results.indexOf(num);
            if(delay === -1) delay = 100;
            let delayWeight = (num === 1) ? delay/10 : (num === 2 ? delay/20 : delay/40);
            let finalScore = (freqRecent * 100) + (delayWeight * 15);
            scores.push({ num, score: finalScore });
        });

        let top3 = scores.sort((a, b) => b.score - a.score).slice(0, 3);
        let total = top3.reduce((a, b) => a + b.score, 0);
        let p1 = Math.round((top3[0].score / total) * 100);
        let p2 = Math.round((top3[1].score / total) * 100);
        let p3 = 100 - (p1 + p2);

        document.getElementById("predictorDisplay").innerHTML = top3.map((item, i) => {
            let p = (i === 0) ? p1 : (i === 1 ? p2 : p3);
            return `<div class="pred-line"><div class="pred-num-tag">${item.num}</div><div class="pred-bar-wrapper"><div class="pred-bar-active" style="width:${p}%"></div></div><div class="pred-percent-tag">${p}%</div></div>`;
        }).join('');
    }

    function runBacktest() {
        if (results.length < 13) return;
        let totalProfitNet = 0, nbrWins = 0, nbrLosses = 0, tourActuelMise = 1, pertesSession = 0;
        let history = [...results].reverse();

        for (let i = 0; i < history.length; i++) {
            let miseDuTour = grilleMise[tourActuelMise];
            if (history[i] === 2) {
                totalProfitNet += (miseDuTour * 3) - (pertesSession + miseDuTour);
                nbrWins++;
                tourActuelMise = 1; pertesSession = 0;
            } else {
                pertesSession += miseDuTour;
                tourActuelMise++;
                if (tourActuelMise > 12) {
                    totalProfitNet -= pertesSession;
                    nbrLosses++;
                    tourActuelMise = 1; pertesSession = 0;
                }
            }
        }

        document.getElementById("backtest-results").innerHTML = `
            <div class="stat-row"><span>Succès (< 12 tours) :</span> <span class="win">${nbrWins}</span></div>
            <div class="stat-row"><span>Échecs (Perte 30k) :</span> <span class="loss">${nbrLosses}</span></div>
            <div class="stat-row" style="margin-top:5px; border-top:1px solid #333; padding-top:5px;">
                <span>PROFIT NET TOTAL :</span> <span style="color:${totalProfitNet >= 0 ? 'var(--accent)' : 'var(--red)'}; font-size:14px;">${totalProfitNet.toLocaleString()} Ar</span>
            </div>
        `;
    }

    window.onload = updateUI;
</script>
</body>
</html>
