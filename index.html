<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tracker Pro v22 - Recovery Audio</title>
    <style>
        :root {
            --bg: #05050a; --card: #121225; --accent: #00ffcc;
            --blue: #4d94ff; --gold: #f1c40f; --white: #ffffff; --red: #ff4757;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; overflow-x: hidden; }
        .container { width: 100%; max-width: 400px; margin: auto; display: flex; flex-direction: column; gap: 8px; }

        /* ALERTE CRITIQUE NUMÉRO 2 */
        #danger-zone {
            display: none; background: var(--red); color: white;
            text-align: center; padding: 15px; border-radius: 12px;
            font-weight: 900; font-size: 1.2rem;
            animation: pulse-red 0.6s infinite; margin-bottom: 5px;
            border: 2px solid white;
        }
        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* PAVÉ NUMÉRIQUE */
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { 
            background: linear-gradient(145deg, #1e2a4a, #121225);
            border: 1px solid #23305c; color: var(--white);
            font-size: 1.5rem; font-weight: 900; padding: 18px 0;
            border-radius: 12px; cursor: pointer; touch-action: manipulation;
        }
        .num-btn:active { background: var(--accent); color: #000; }

        /* BOITES D'ANALYSE */
        .box { background: #000; border: 2px solid var(--blue); border-radius: 15px; padding: 12px; }
        .box-red { border-color: var(--red); }
        .title { text-align: center; font-weight: 900; font-size: 13px; margin-bottom: 10px; text-transform: uppercase; }

        .pred-line { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .num-tag { background: var(--blue); color: #fff; padding: 4px 8px; border-radius: 5px; font-weight: 900; min-width: 30px; text-align: center; }
        .bar-wrap { flex-grow: 1; height: 10px; background: #222; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--accent)); transition: width 0.4s; }
        .perc { color: var(--accent); font-weight: 900; font-family: monospace; min-width: 45px; text-align: right; }

        .btn-action { width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 5px; border: 1px solid #333; }
        
        .history-mini { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 5px; background: #000; padding: 8px; border-radius: 10px; }
        .res-item { background: #111; font-size: 10px; text-align: center; padding: 4px 0; border-radius: 3px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="danger-zone">🚨 MISE CRITIQUE : TOUR <span id="tour-count">0</span> SANS 2 !</div>

    <div class="numpad">
        <button class="num-btn" onclick="quickAdd(1)">1</button>
        <button class="num-btn" onclick="quickAdd(2)">2</button>
        <button class="num-btn" onclick="quickAdd(5)">5</button>
        <button class="num-btn" onclick="quickAdd(8)">8</button>
        <button class="num-btn" onclick="quickAdd(10)">10</button>
        <button class="num-btn" onclick="quickAdd(15)">15</button>
        <button class="num-btn" onclick="quickAdd(20)">20</button>
        <button class="num-btn" onclick="quickAdd(30)">30</button>
        <button class="num-btn" onclick="quickAdd(40)">40</button>
    </div>

    <div class="box">
        <div class="title" style="color: var(--blue)">Predictor Balanced (Mixte)</div>
        <div id="predictorDisplay"></div>
    </div>

    <div class="box box-red">
        <div class="title" style="color: var(--red)">Performance Récupération (20k / Palier 13)</div>
        <div id="recoveryStats" style="text-align:center; font-size: 12px; margin-bottom: 8px;">Analyse sur 5000 numéros.</div>
        <button class="btn-action" style="background:#1a1a1a; color:var(--red); border-color:var(--red);" onclick="analyzeRecovery()">Scanner l'historique</button>
    </div>

    <div class="history-mini" id="grid-live"></div>
    <button class="btn-action" style="background:#111; color:#555; font-size:10px;" onclick="deleteLast()">EFFACER ERREUR</button>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_final_v7")) || [];
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playAlertSound() {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function quickAdd(val) {
        results.unshift(val);
        if(results.length > 5000) results.pop();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        if(results.length === 0) return;
        results.shift();
        localStorage.setItem("mw_final_v7", JSON.stringify(results));
        updateUI();
    }

    function updateUI() {
        document.getElementById("grid-live").innerHTML = results.slice(0, 20).map(n => `<div class="res-item">${n}</div>`).join('');
        
        let gap2 = results.indexOf(2);
        const dangerZone = document.getElementById("danger-zone");
        
        if (gap2 >= 10) {
            dangerZone.style.display = "block";
            document.getElementById("tour-count").innerText = gap2;
            playAlertSound();
        } else {
            dangerZone.style.display = "none";
        }
        calculateBalancedPredictor();
    }

    function calculateBalancedPredictor() {
        if (results.length === 0) return;
        const allNums = [1, 2, 5, 8, 10, 15, 20, 30, 40];
        const recent50 = results.slice(0, 50);
        let scores = [];

        allNums.forEach(num => {
            let freqRecent = (recent50.filter(x => x === num).length / (recent50.length || 1)) * 100;
            let delay = results.indexOf(num);
            if(delay === -1) delay = 100;
            let delayScore = (delay * (num === 2 ? 3.5 : 1.2)); 
            let finalScore = (freqRecent * 0.4) + (delayScore * 0.6);
            scores.push({ num, score: finalScore });
        });

        let top3 = scores.sort((a, b) => b.score - a.score).slice(0, 3);
        let sum = top3.reduce((a, b) => a + b.score, 0);

        document.getElementById("predictorDisplay").innerHTML = top3.map((item, i) => {
            let p = Math.round((item.score / sum) * 100);
            return `<div class="pred-line">
                <div class="num-tag" style="background:${item.num === 2 ? 'var(--red)' : 'var(--blue)'}">${item.num}</div>
                <div class="bar-wrap"><div class="bar-fill" style="width:${p}%; background:${item.num === 2 ? 'var(--red)' : ''}"></div></div>
                <div class="perc">${p}%</div>
            </div>`;
        }).join('');
    }

    function analyzeRecovery() {
        let gains = 0; let losses = 0; let gap = 0;
        const history = [...results].reverse();
        history.forEach(num => {
            if (num === 2) { if (gap < 13) gains++; gap = 0; } 
            else { gap++; if (gap === 13) { losses++; gap = 0; } }
        });
        document.getElementById("recoveryStats").innerHTML = `<b>RECUPS : ${gains} | ÉCHECS : ${losses}</b><br>Efficacité réelle : ${((gains/(gains+losses))*100).toFixed(1)}%`;
    }

    updateUI();
</script>
</body>
</html>
