<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Megawheel Tactical v19.1</title>
    <style>
        :root {
            --bg: #0d0d1a; --card: #16213e; --accent: #00ffcc;
            --gold: #f1c40f; --white: #ffffff; --red: #ff4757;
            --blue: #4d94ff; --out-shadow: 4px 4px 8px #05050a;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: var(--card); padding: 15px; border-radius: 20px; box-shadow: var(--out-shadow); display: flex; flex-direction: column; gap: 10px; }
        .app-header { text-align: center; border-bottom: 2px solid #23305c; padding-bottom: 5px; }
        .app-title { font-size: 1rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .app-title span { color: var(--accent); }
        
        #alert-zone { 
            min-height: 45px; background: rgba(0, 0, 0, 0.4); border-radius: 10px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 11px; font-weight: 900; color: #555; border: 1px solid #1a1a1a;
        }
        .active-alert { border-color: var(--red) !important; color: white !important; background: rgba(255, 71, 87, 0.4) !important; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { 
            background: #1e2a4a; border: 1px solid #23305c; color: #fff;
            font-size: 1.4rem; font-weight: 900; padding: 15px 0; border-radius: 12px;
            cursor: pointer;
        }
        .num-btn:active { background: var(--accent); color: #000; }
        .del-btn { grid-column: span 3; background: #1a1a2e; color: #999; border: 1px solid #333; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; }

        .predictor-box { 
            background: #05050a; border-radius: 15px; padding: 15px; border: 2px solid var(--gold); 
            text-align: center; min-height: 100px;
        }
        .pred-title { color: var(--gold); font-weight: 900; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .tactical-info { display: flex; align-items: center; justify-content: space-around; }
        .step-tag { background: var(--gold); color: #000; padding: 5px 10px; border-radius: 5px; font-weight: 900; }
        .amount-tag { color: var(--gold); font-size: 24px; font-weight: 900; }
        .obs-mode { color: #444; font-size: 18px; font-weight: bold; padding: 20px 0; }

        .history-mini { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #000; padding: 8px; border-radius: 10px; margin-top: 10px; }
        .res-item { background: #111; font-size: 10px; padding: 4px; text-align: center; border-radius: 3px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div class="app-header">
        <h1 class="app-title">MEGAWHEEL <span>TACTICAL v19.1</span></h1>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="quickAdd(1)">1</button>
        <button class="num-btn" onclick="quickAdd(2)">2</button>
        <button class="num-btn" onclick="quickAdd(5)">5</button>
        <button class="num-btn" onclick="quickAdd(8)">8</button>
        <button class="num-btn" onclick="quickAdd(10)">10</button>
        <button class="num-btn" onclick="quickAdd(15)">15</button>
        <button class="num-btn" onclick="quickAdd(20)">20</button>
        <button class="num-btn" onclick="quickAdd(30)">30</button>
        <button class="num-btn" onclick="quickAdd(40)">40</button>
        <button class="del-btn" onclick="deleteLast()">CORRECTION DERNIER TOUR</button>
    </div>

    <div id="alert-zone">ANALYSE LOGIQUE ACTIVE</div>

    <div class="predictor-box">
        <div class="pred-title">Assistant de Mise (Cible : 5)</div>
        <div id="tacticalDisplay" class="obs-mode">CHARGEMENT...</div>
    </div>

    <div class="history-mini" id="grid-live"></div>
</div>

<script>
    let results = JSON.parse(localStorage.getItem("mw_tactical")) || [];
    let currentStep = 0; 
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Tableau Excel : image_8d4d9a.png
    const grilleMise = {
        1:500, 2:500, 3:500, 4:1000, 5:1000, 6:1000, 
        7:2000, 8:2000, 9:3500, 10:4500, 11:5000, 12:8500
    };

    function playAlertSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = "square";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
        setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            osc2.connect(gain);
            osc2.type = "square";
            osc2.frequency.setValueAtTime(1100, audioCtx.currentTime);
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.2);
        }, 150);
    }

    function quickAdd(val) {
        let lastDelayBeforeAdd = results.indexOf(5);
        if (lastDelayBeforeAdd === -1) lastDelayBeforeAdd = 99;

        if (val === 5) {
            currentStep = 0;
        } else if (currentStep === 0 && lastDelayBeforeAdd >= 19) {
            currentStep = 1;
        } else if (currentStep > 0) {
            currentStep++;
        }

        results.unshift(val);
        if(results.length > 300) results.pop();
        localStorage.setItem("mw_tactical", JSON.stringify(results));
        updateUI();
    }

    function deleteLast() {
        results.shift();
        if (currentStep > 0) currentStep--;
        updateUI();
    }

    function updateUI() {
        document.getElementById("grid-live").innerHTML = results.slice(0, 30).map(n => `<div class="res-item">${n}</div>`).join('');
        
        const az = document.getElementById("alert-zone");
        const display = document.getElementById("tacticalDisplay");
        let delay5 = results.indexOf(5);
        if (delay5 === -1) delay5 = results.length;

        if (currentStep === 0) {
            if (delay5 >= 20) {
                az.innerHTML = "⚠️ CIBLE DÉTECTÉE : MISER SUR LE 5";
                az.classList.add("active-alert");
                display.className = "predictor-box";
                display.innerHTML = `<div class="tactical-info"><span class="step-tag">T 1</span> <span class="amount-tag" style="color:var(--accent)">500 Ar</span></div>`;
                playAlertSound(); 
            } else {
                az.innerHTML = "MODE CHASSE • ATTENTE 20 TOURS";
                az.classList.remove("active-alert");
                display.className = "obs-mode";
                display.innerHTML = `EN ATTENTE : ${delay5}/20 t`;
            }
        } else {
            az.innerHTML = "⚠️ RECOVERY ACTIF - TOUR " + currentStep;
            az.classList.add("active-alert");
            
            if (currentStep > 12) {
                display.innerHTML = `<div style="color:var(--red); font-weight:bold; font-size:14px; padding:15px;">LIMITE 30 000 Ar ATTEINTE !<br>ARRÊT SÉCURITÉ</div>`;
            } else {
                let mise = grilleMise[currentStep];
                display.innerHTML = `
                    <div class="tactical-info">
                        <span class="step-tag">T ${currentStep}/12</span>
                        <span class="amount-tag">${mise.toLocaleString()} Ar</span>
                    </div>`;
            }
        }
    }

    window.onload = updateUI;
</script>
</body>
</html>
